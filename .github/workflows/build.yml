name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-libraries:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    - name: Build AGSTools
      run: dotnet build AGSTools/AGSTools.csproj -c Release
    - name: Build TranslationApi
      run: dotnet build TranslationApi/TranslationApi.csproj -c Release
    - name: Build AGSTranslate CLI
      run: dotnet build AGSTranslate/AGSTranslate.csproj -c Release

  build-gui:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-x64
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    - name: Publish Avalonia App
      run: dotnet publish AGS_TranslationEditor.Avalonia/AGS_TranslationEditor.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o ./publish/${{ matrix.rid }}
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AGS_TranslationEditor-${{ matrix.rid }}
        path: ./publish/${{ matrix.rid }}
